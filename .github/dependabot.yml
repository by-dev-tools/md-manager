# Dependabot config.
#
# Routine version-update PRs are intentionally disabled (open-pull-requests-limit: 0)
# to avoid weekly noise on an 18-dep project. Security updates are separate —
# enable them via repo Settings → Code security and analysis → "Dependabot
# security updates". Those flow regardless of this file.
#
# To turn on routine version updates later: bump the limit and uncomment the
# `groups` block to batch related deps (e.g., all Radix packages in one PR).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0
